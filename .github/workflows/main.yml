name: APK Universal Generator

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 1. Validación y Limpieza de Variables ────────────────
      - name: Set env vars & Fallback
        run: |
          # Capturar variables del payload
          URL="${{ github.event.client_payload.url }}"
          M_URL="${{ github.event.client_payload.manifestUrl }}"
          NAME="${{ github.event.client_payload.appName }}"
          
          # Si la URL del manifiesto no empieza con http, crear una por defecto
          if [[ ! $M_URL =~ ^http ]]; then
            echo "URL de manifiesto inválida. Usando fallback..."
            M_URL="${URL%/}/manifest.json"
          fi

          echo "APP_URL=$URL" >> $GITHUB_ENV
          echo "MANIFEST_URL=$M_URL" >> $GITHUB_ENV
          echo "APP_NAME=${NAME:-PWA_App}" >> $GITHUB_ENV
          echo "THEME_COLOR=${{ github.event.client_payload.themeColor || '#000000' }}" >> $GITHUB_ENV
          echo "ICON_URL=${{ github.event.client_payload.iconUrl }}" >> $GITHUB_ENV
          echo "PKG_ID=${{ github.event.client_payload.packageId || 'com.pwa.app' }}" >> $GITHUB_ENV
          echo "V_NAME=${{ github.event.client_payload.vName || '1.0.0' }}" >> $GITHUB_ENV
          echo "V_CODE=${{ github.event.client_payload.vCode || '1' }}" >> $GITHUB_ENV
          
          APP_HOST=$(echo "$URL" | sed -e 's,https://,,;s,http://,,;s,/.*,,')
          echo "APP_HOST=$APP_HOST" >> $GITHUB_ENV

      # ── 2. Preparar Keystore ─────────────────────────────────
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "crispro941" \
            -keypass  "crispro941" \
            -dname    "CN=Crispro, OU=Studio, O=Crispro, L=Santiago, ST=RM, C=CL"

      - name: Configure Bubblewrap CLI
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" \
            > ~/.bubblewrap/config.json

      # ── 3. Generar Manifiesto TWA Local ──────────────────────
      - name: Generate twa-manifest.json
        run: |
          cat <<EOF > twa-manifest.json
          {
            "packageId": "$PKG_ID",
            "host": "$APP_HOST",
            "name": "$APP_NAME",
            "shortName": "$APP_NAME",
            "themeColor": "$THEME_COLOR",
            "backgroundColor": "#ffffff",
            "navigationColor": "#000000",
            "startUrl": "/",
            "iconUrl": "$ICON_URL",
            "maskableIconUrl": "$ICON_URL",
            "appVersionCode": $V_CODE,
            "appVersionName": "$V_NAME",
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "webManifestUrl": "$MANIFEST_URL",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false }
          }
          EOF

      # ── 4. Build Robusto ─────────────────────────────────────
      - name: Build APK with Bubblewrap
        run: |
          # Intentamos inicializar. Si la URL falla, usamos un dummy para que no se detenga.
          # 'yes' responde 'Y' a la pregunta de regenerar el proyecto.
          yes | bubblewrap init --manifest "$MANIFEST_URL" --no-prompt || \
          yes | bubblewrap init --manifest "https://google.com/manifest.json" --no-prompt

          # Sobrescribimos el archivo generado por el init con nuestro manifest configurado
          cp -f twa-manifest.json ./twa-manifest.json

          # Compilar ignorando preguntas de actualización
          bubblewrap build --no-prompt \
            --signingKeyPath="./android.keystore" \
            --signingKeyPassword="crispro941" \
            --signingKeyStorePassword="crispro941" \
            --signingKeyAlias="android"

      # ── 5. Entrega del Archivo ───────────────────────────────
      - name: Prepare APK for delivery
        run: |
          CLEAN_NAME=$(echo "$APP_NAME" | sed 's/ /_/g')
          FILE_NAME="${CLEAN_NAME}-v${V_NAME}.apk"
          
          # Buscar el APK firmado (normalmente en la raíz o subcarpetas)
          find . -name "*release-signed.apk" -exec cp {} app.apk \;
          
          echo "APK_NAME=$FILE_NAME" >> $GITHUB_ENV

      - name: Upload APK to server
        run: |
          curl -f -v -X POST \
            -F "file=@app.apk" \
            "https://tusitio.cl/upload_apk.php?key=CRISPRO_941_ALTA_SEGURIDAD_XYZ_2024&name=$APK_NAME"

      - name: Save APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: app.apk
          retention-days: 7
