name: APK Universal Generator
on:
  repository_dispatch:
    types: [build-app]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - run: npm install -g @bubblewrap/cli

      - name: Build APK
        run: |
          # Variables
          APP_URL="${{ github.event.client_payload.url }}"
          APP_HOST=$(echo $APP_URL | sed -e 's,https://,,;s,/.*,,')
          APP_NAME="${{ github.event.client_payload.appName }}"
          ICON="${{ github.event.client_payload.iconUrl }}"
          COLOR="${{ github.event.client_payload.themeColor }}"
          
          # Si no tiene manifest en la web, creamos uno virtual
          cat <<EOF > manifest.json
          {
            "name": "$APP_NAME", "short_name": "$APP_NAME",
            "start_url": "/", "display": "standalone",
            "background_color": "#ffffff", "theme_color": "$COLOR",
            "icons": [{ "src": "$ICON", "sizes": "512x512", "type": "image/png" }]
          }
          EOF

          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "crispro941" -keypass "crispro941" -dname "CN=Crispro"

          cat <<EOF > twa-manifest.json
          {
            "packageId": "cl.crispro941.twa", "host": "$APP_HOST",
            "name": "$APP_NAME", "shortName": "$APP_NAME",
            "themeColor": "$COLOR", "backgroundColor": "#ffffff",
            "startUrl": "/", "iconUrl": "$ICON", "maskableIconUrl": "$ICON",
            "appVersionCode": 1, "appVersionName": "1.0.0",
            "signingKey": { "path": "./android.keystore", "alias": "android" },
            "webManifestUrl": "https://$APP_HOST/manifest.json",
            "fallbackType": "customtabs", "features": {}, "alphaDependencies": { "enabled": false }
          }
          EOF

          printf "1\n1.0.0\n" | bubblewrap update --skipConfig
          sed -i 's/: ,/: "" ,/g' app/build.gradle
          chmod +x gradlew
          ./gradlew assembleRelease -Pandroid.injected.signing.store.file=../android.keystore -Pandroid.injected.signing.store.password=crispro941 -Pandroid.injected.signing.key.alias=android -Pandroid.injected.signing.key.password=crispro941
          
          FILE_NAME=$(echo "$APP_NAME" | sed 's/ /_/g')-v1.0.0.apk
          find . -name "*release.apk" -exec mv {} app.apk \;
          curl -X POST -F "file=@app.apk" "https://tusitio.cl/upload_apk.php?key=CRISPRO_941_ALTA_SEGURIDAD_XYZ_2024&name=$FILE_NAME"
