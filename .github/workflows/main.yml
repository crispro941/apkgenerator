name: APK Universal Generator

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Java 17 ─────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Node / Bubblewrap ────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      # ── Android SDK ──────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Variables del payload ────────────────────────────────
      - name: Set env vars
        run: |
          echo "APP_URL=${{ github.event.client_payload.url }}"             >> $GITHUB_ENV
          echo "MANIFEST_URL=${{ github.event.client_payload.manifestUrl }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.appName }}"         >> $GITHUB_ENV
          echo "THEME_COLOR=${{ github.event.client_payload.themeColor }}"   >> $GITHUB_ENV
          echo "ICON_URL=${{ github.event.client_payload.iconUrl }}"         >> $GITHUB_ENV
          echo "PKG_ID=${{ github.event.client_payload.packageId }}"         >> $GITHUB_ENV
          echo "V_NAME=${{ github.event.client_payload.vName }}"             >> $GITHUB_ENV
          echo "V_CODE=${{ github.event.client_payload.vCode }}"             >> $GITHUB_ENV
          APP_HOST=$(echo "${{ github.event.client_payload.url }}" | sed -e 's,https://,,;s,http://,,;s,/.*,,')
          echo "APP_HOST=$APP_HOST" >> $GITHUB_ENV

      # ── Keystore ─────────────────────────────────────────────
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "crispro941" \
            -keypass  "crispro941" \
            -dname    "CN=Crispro, OU=Studio, O=Crispro, L=Santiago, ST=RM, C=CL"

      # ── Bubblewrap config ────────────────────────────────────
      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" \
            > ~/.bubblewrap/config.json

      # ── TWA Manifest ─────────────────────────────────────────
      - name: Generate twa-manifest.json
        run: |
          cat <<EOF > twa-manifest.json
          {
            "packageId":         "$PKG_ID",
            "host":              "$APP_HOST",
            "name":              "$APP_NAME",
            "shortName":         "$APP_NAME",
            "themeColor":        "$THEME_COLOR",
            "backgroundColor":   "#ffffff",
            "navigationColor":   "#000000",
            "startUrl":          "/",
            "iconUrl":           "$ICON_URL",
            "maskableIconUrl":   "$ICON_URL",
            "appVersionCode":    $V_CODE,
            "appVersionName":    "$V_NAME",
            "signingKey": {
              "path":  "../android.keystore",
              "alias": "android"
            },
            "webManifestUrl":    "$MANIFEST_URL",
            "fallbackType":      "customtabs",
            "features":          {},
            "alphaDependencies": { "enabled": false }
          }
          EOF

      # ── Init & Build (Versión no interactiva) ────────────────
      - name: Bubblewrap Init and Build
        run: |
          # 1. Crear la carpeta manualmente para evitar la primera pregunta
          mkdir -p android-project
          
          # 2. Usar 'yes' para responder automáticamente a cualquier otra confirmación
          yes | bubblewrap init --manifest twa-manifest.json --directory ./android-project --skipProxy
          
          # 3. Entrar y construir
          cd android-project
          bubblewrap build \
            --signingKeyPath ../android.keystore \
            --signingKeyAlias android \
            --signingKeyPassword "crispro941" \
            --signingStorePassword "crispro941" \
            --skipProxy
          
          # 4. Mover el APK final (el que está firmado) a la raíz
          cp ./app-release-signed.apk ../app.apk

      # ── Renombrar y subir ────────────────────────────────────
      - name: Rename and Upload
        run: |
          FILE_NAME=$(echo "$APP_NAME" | sed 's/ /_/g')-v${V_NAME}.apk
          echo "APK_NAME=$FILE_NAME" >> $GITHUB_ENV
          
          curl -f -X POST \
            -F "file=@app.apk" \
            "https://demo.crispro941.cl/apk/v2/upload_apk.php?key=CRISPRO_941_ALTA_SEGURIDAD_XYZ_2024&name=$FILE_NAME"

      # ── Guardar APK como artifact ────────────────────────────
      - name: Save APK as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: app.apk
          retention-days: 7
