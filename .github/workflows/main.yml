name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      # Preparamos el entorno para Node 24 según la recomendación de GitHub
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Actualizado a la versión más reciente

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          echo "Iniciando generación para: ${{ github.event.client_payload.url }}"
          
          # FORZAR CONFIGURACIÓN: Creamos el archivo de configuración de Bubblewrap directamente
          # Esto evita que 'doctor' o 'init' pregunten por las rutas del JDK o SDK
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # Ejecutamos init de forma no interactiva
          # Usamos un archivo temporal para las respuestas de 'init' por si acaso
          bubblewrap init --url=${{ github.event.client_payload.url }} --yes
          
          # Construimos el APK
          bubblewrap build --yes
          
          # Organizamos la salida
          mkdir -p output
          mv *.apk output/ || echo "No se encontró el APK en la raíz"

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
          if-no-files-found: error
