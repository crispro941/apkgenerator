name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          # 1. CONFIGURACIÓN DE RUTAS
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\",\"lastCheckForUpdates\":$(date +%s%3N)}" > ~/.bubblewrap/config.json

          # 2. CREACIÓN DEL KEYSTORE (Firma)
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "crispro941" -keypass "crispro941" \
            -dname "CN=Cristobal Paez, OU=Dev, O=CRISPRO941, L=Las Cabras, S=OHiggins, C=CL"

          # 3. GENERACIÓN MANUAL DEL ARCHIVO DE PROYECTO (twa-manifest.json)
          # Esto evita que Bubblewrap haga preguntas.
          cat <<EOF > twa-manifest.json
          {
            "packageId": "cl.crispro941.twa",
            "host": "crispro941.cl",
            "name": "CRISPRO941 - Soluciones Digitales",
            "shortName": "CRISPRO941",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "navigationColorDark": "#000000",
            "navigationDividerColor": "#000000",
            "navigationDividerColorDark": "#000000",
            "backgroundColor": "#ffffff",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://i.ibb.co/M5BsCD9K/descarga.png",
            "maskableIconUrl": "https://i.ibb.co/M5BsCD9K/descarga.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "appVersionCode": 1,
            "appVersionName": "1.0.0",
            "orientation": "portrait",
            "display": "standalone",
            "unsupportedFeatures": [],
            "isChromeOSOnly": false,
            "isWebWidgetsEnabled": false,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://crispro941.cl/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {
              "enabled": false
            },
            "enableSiteSettingsShortcut": true,
            "isMultiColorSchemeEnabled": false
          }
          EOF

          # 4. INICIALIZAR DESDE EL ARCHIVO CREADO
          # 'init --skipConfig' leerá el twa-manifest.json que acabamos de escribir
          bubblewrap init --manifest=twa-manifest.json --skipConfig

          # 5. CONFIGURACIÓN DE CONTRASEÑAS PARA EL BUILD
          echo "{\"passwords\":{\"keystore\":\"crispro941\",\"key\":\"crispro941\"},\"keyPath\":\"./android.keystore\",\"alias\":\"android\"}" > bubblewrap.json

          # 6. COMPILACIÓN FINAL
          # Aceptamos licencias y compilamos
          yes | bubblewrap build --yes --skipCheck

          # 7. MOVER RESULTADO A OUTPUT
          mkdir -p output
          find . -name "*.apk" -exec mv {} output/ \;
          
          if [ -z "$(ls -A output)" ]; then
            echo "Error: No se generó el APK."
            exit 1
          fi

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
