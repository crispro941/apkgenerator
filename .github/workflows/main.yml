name: APK Generator Pro

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        run: |
          CUR_DIR=$(pwd)
          KEYSTORE_PATH="$CUR_DIR/android.keystore"
          APP_URL="${{ github.event.client_payload.url }}"
          APP_HOST=$(echo $APP_URL | sed -e 's,https://,,;s,/.*,,')
          APP_NAME="${{ github.event.client_payload.appName }}"
          FILE_NAME=$(echo "$APP_NAME" | sed 's/ /_/g')-v${{ github.event.client_payload.vName }}.apk

          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

          keytool -genkey -v -keystore "$KEYSTORE_PATH" -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "crispro941" -keypass "crispro941" \
            -dname "CN=Cristobal Paez, OU=Dev, O=CRISPRO941, L=Las Cabras, S=OHiggins, C=CL"

          cat <<EOF > twa-manifest.json
          {
            "packageId": "${{ github.event.client_payload.packageId }}",
            "host": "$APP_HOST",
            "name": "$APP_NAME",
            "shortName": "$APP_NAME",
            "themeColor": "${{ github.event.client_payload.themeColor }}",
            "navigationColor": "${{ github.event.client_payload.themeColor }}",
            "backgroundColor": "${{ github.event.client_payload.backgroundColor }}",
            "startUrl": "/",
            "iconUrl": "${{ github.event.client_payload.iconUrl }}",
            "maskableIconUrl": "${{ github.event.client_payload.iconUrl }}",
            "appVersionCode": ${{ github.event.client_payload.vCode }},
            "appVersionName": "${{ github.event.client_payload.vName }}",
            "signingKey": { "path": "$KEYSTORE_PATH", "alias": "android" },
            "orientation": "portrait", "display": "standalone",
            "webManifestUrl": "$APP_URL/manifest.json",
            "fallbackType": "customtabs", "features": {}, "alphaDependencies": { "enabled": false }
          }
          EOF

          printf "1\n1.0.0\n" | bubblewrap update --skipConfig
          sed -i 's/: ,/: "" ,/g' app/build.gradle
          chmod +x gradlew
          ./gradlew assembleRelease -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" -Pandroid.injected.signing.store.password=crispro941 -Pandroid.injected.signing.key.alias=android -Pandroid.injected.signing.key.password=crispro941

          find . -name "*release.apk" -exec mv {} app-release.apk \;
          
          # ENVÍO AL SERVIDOR
          curl -X POST -F "file=@app-release.apk" \
          "https://demo.crispro941.cl/apk/upload_apk.php?key=CRISPRO_941_ALTA_SEGURIDAD_XYZ_2024&name=$FILE_NAME"

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada
          path: app-release.apk
