name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          # 1. Configuración silenciosa de rutas (JDK y Android SDK)
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # 2. Inicialización del proyecto PWA
          # 'yes ""' inyecta ENTERS automáticos para responder a Domain, URL path, etc.
          # '--skipConfig' le dice que use valores predeterminados siempre que sea posible.
          echo "Generando configuración para: ${{ github.event.client_payload.url }}"
          yes "" | bubblewrap init --url=${{ github.event.client_payload.url }} --manifest=${{ github.event.client_payload.url }}/manifest.json --skipConfig || true
          
          # 3. Compilación del binario APK
          # 'yes' (sin comillas) envía la letra 'y' para aceptar licencias de Android automáticamente.
          # '--yes' confirma las acciones de Bubblewrap.
          yes | bubblewrap build --yes
          
          # 4. Organización de archivos para el artefacto de descarga
          mkdir -p output
          
          # Buscamos el APK en la raíz o en la carpeta de build estándar de Android
          mv *.apk output/ 2>/dev/null || true
          mv app/build/outputs/apk/release/*.apk output/ 2>/dev/null || true
          
          # Verificación: Si no hay archivos en output, forzamos el fallo del job
          if [ -z "$(ls -A output)" ]; then
            echo "Error crítico: No se encontró el archivo APK generado."
            exit 1
          fi

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
          if-no-files-found: error
