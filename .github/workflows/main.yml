name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        # Usamos printf para responder automáticamente a cualquier pregunta extra del CLI
        run: |
          echo "Generando APK para: ${{ github.event.client_payload.url }}"
          
          # Configuramos Bubblewrap para que sepa dónde está el JDK y el Android SDK sin preguntar
          # Esto evita el error 130
          bubblewrap doctor --skipPathUpdate <<EOF
          n
          $JAVA_HOME
          $ANDROID_HOME
          EOF

          # Inicialización y build forzado
          bubblewrap init --url=${{ github.event.client_payload.url }} --yes
          bubblewrap build --yes
          
          mkdir -p output
          mv *.apk output/

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
          if-no-files-found: error
