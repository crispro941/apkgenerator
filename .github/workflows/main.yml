name: APK Universal Generator

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Preparación del Entorno ───────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 2. Variables y Configuración ─────────────────────────
      - name: Set env vars
        run: |
          echo "APP_URL=${{ github.event.client_payload.url }}"             >> $GITHUB_ENV
          echo "MANIFEST_URL=${{ github.event.client_payload.manifestUrl }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.appName }}"         >> $GITHUB_ENV
          echo "THEME_COLOR=${{ github.event.client_payload.themeColor }}"   >> $GITHUB_ENV
          echo "ICON_URL=${{ github.event.client_payload.iconUrl }}"         >> $GITHUB_ENV
          echo "PKG_ID=${{ github.event.client_payload.packageId }}"         >> $GITHUB_ENV
          echo "V_NAME=${{ github.event.client_payload.vName }}"             >> $GITHUB_ENV
          echo "V_CODE=${{ github.event.client_payload.vCode }}"             >> $GITHUB_ENV
          
          # Extraer Host (dominio) del URL
          APP_HOST=$(echo "${{ github.event.client_payload.url }}" | sed -e 's,https://,,;s,http://,,;s,/.*,,')
          echo "APP_HOST=$APP_HOST" >> $GITHUB_ENV

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "crispro941" \
            -keypass  "crispro941" \
            -dname    "CN=Crispro, OU=Studio, O=Crispro, L=Santiago, ST=RM, C=CL"

      - name: Configure Bubblewrap CLI
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" \
            > ~/.bubblewrap/config.json

      # ── 3. Generación del Manifiesto TWA ─────────────────────
      - name: Generate twa-manifest.json
        run: |
          cat <<EOF > twa-manifest.json
          {
            "packageId":         "$PKG_ID",
            "host":              "$APP_HOST",
            "name":              "$APP_NAME",
            "shortName":         "$APP_NAME",
            "themeColor":        "$THEME_COLOR",
            "backgroundColor":   "#ffffff",
            "navigationColor":   "#000000",
            "startUrl":          "/",
            "iconUrl":           "$ICON_URL",
            "maskableIconUrl":   "$ICON_URL",
            "appVersionCode":    $V_CODE,
            "appVersionName":    "$V_NAME",
            "signingKey": {
              "path":  "./android.keystore",
              "alias": "android"
            },
            "webManifestUrl":    "$MANIFEST_URL",
            "fallbackType":      "customtabs",
            "features":          {},
            "alphaDependencies": { "enabled": false }
          }
          EOF

      # ── 4. Construcción del APK ──────────────────────────────
      - name: Build APK with Bubblewrap
        run: |
          # build genera el proyecto y compila en un solo paso
          bubblewrap build --no-prompt \
            --signingKeyPath="./android.keystore" \
            --signingKeyPassword="crispro941" \
            --signingKeyStorePassword="crispro941" \
            --signingKeyAlias="android"

      # ── 5. Procesamiento de Salida ───────────────────────────
      - name: Prepare APK for delivery
        run: |
          # Limpiar nombre de app para el archivo
          CLEAN_NAME=$(echo "$APP_NAME" | sed 's/ /_/g')
          FILE_NAME="${CLEAN_NAME}-v${V_NAME}.apk"
          
          # Bubblewrap genera un archivo terminado en release-signed.apk
          find . -name "*release-signed.apk" -exec cp {} app.apk \;
          
          echo "APK_NAME=$FILE_NAME" >> $GITHUB_ENV
          echo "Final APK name: $FILE_NAME"

      - name: Upload APK to server
        run: |
          curl -f -v -X POST \
            -F "file=@app.apk" \
            "https://tusitio.cl/upload_apk.php?key=CRISPRO_941_ALTA_SEGURIDAD_XYZ_2024&name=$APK_NAME" \
            || (echo "Upload failed" && exit 1)

      - name: Save APK as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: app.apk
          retention-days: 7
