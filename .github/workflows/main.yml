name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK (Production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Instalación de herramientas necesarias
      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      # Generación del proyecto y compilación
      # Usamos la URL enviada desde tu panel PHP: ${{ github.event.client_payload.url }}
      - name: Build APK from URL
        run: |
          echo "Generando APK para: ${{ github.event.client_payload.url }}"
          
          # Inicializa el proyecto de forma automática con la URL del payload
          # Se usa --yes para aceptar los términos y configuraciones por defecto
          bubblewrap init --url=${{ github.event.client_payload.url }} --yes
          
          # Compila el proyecto para generar el archivo .apk
          bubblewrap build --yes
          
          # Creamos la carpeta de salida y movemos el APK generado
          mkdir -p output
          mv *.apk output/

      # Subida del archivo real al sistema de artefactos
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
          if-no-files-found: error
