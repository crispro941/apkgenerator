name: APK Universal Generator

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          # 1. Extraer y limpiar variables del payload
          APP_URL="${{ github.event.client_payload.url }}"
          MANIFEST_URL="${{ github.event.client_payload.manifestUrl }}"
          APP_NAME="${{ github.event.client_payload.appName }}"
          PKG_ID="${{ github.event.client_payload.packageId }}"
          ICON="${{ github.event.client_payload.iconUrl }}"
          COLOR="${{ github.event.client_payload.themeColor }}"
          V_NAME="${{ github.event.client_payload.vName }}"
          V_CODE="${{ github.event.client_payload.vCode }}"

          # Limpiar el HOST: quitar https://, http:// y cualquier path /final
          APP_HOST=$(echo "$APP_URL" | sed -e 's,https://,,;s,http://,,;s,/.*,,')

          # 2. Configurar Bubblewrap
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

          # 3. Generar Keystore
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "crispro941" -keypass "crispro941" -dname "CN=Crispro, O=Studio, C=CL"

          # 4. Generar twa-manifest.json corregido
          cat <<EOF > twa-manifest.json
          {
            "packageId": "$PKG_ID",
            "host": "$APP_HOST",
            "name": "$APP_NAME",
            "shortName": "$APP_NAME",
            "themeColor": "$COLOR",
            "backgroundColor": "#ffffff",
            "startUrl": "/",
            "iconUrl": "$ICON",
            "maskableIconUrl": "$ICON",
            "appVersionCode": $V_CODE,
            "appVersionName": "$V_NAME",
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "webManifestUrl": "$MANIFEST_URL",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false }
          }
          EOF

          # 5. Inicializar el proyecto en la carpeta actual (.) de forma NO interactiva
          # Usamos 'yes' para aceptar la creación de carpetas y 'printf' para las versiones
          yes | bubblewrap init --manifest twa-manifest.json --directory . --skipProxy

          # 6. Aplicar fix de gradle (el que tenías antes por si acaso)
          if [ -f app/build.gradle ]; then
            sed -i 's/: ,/: "" ,/g' app/build.gradle
          fi

          # 7. Compilar usando gradlew (como en tu versión original)
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/android.keystore \
            -Pandroid.injected.signing.store.password=crispro941 \
            -Pandroid.injected.signing.key.alias=android \
            -Pandroid.injected.signing.key.password=crispro941

          # 8. Renombrar y Subir
          FILE_NAME=$(echo "$APP_NAME" | sed 's/ /_/g')-v${V_NAME}.apk
          find . -name "*release.apk" -exec cp {} app.apk \;
          
          curl -f -X POST \
            -F "file=@app.apk" \
            "https://demo.crispro941.cl/apk/v2/upload_apk.php?key=CRISPRO_941_ALTA_SEGURIDAD_XYZ_2024&name=$FILE_NAME"

      - name: Save Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app.apk
