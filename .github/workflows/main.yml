name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          # 1. PRE-CONFIGURACIÓN ABSOLUTA
          # Forzamos la creación del directorio y el archivo de configuración con rutas del sistema
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\",\"lastCheckForUpdates\":$(date +%s%3N)}" > ~/.bubblewrap/config.json
          
          # 2. CREACIÓN DEL KEYSTORE (Firma de CRISPRO941)
          # Lo creamos ANTES para que Bubblewrap lo encuentre y no haga preguntas de nombres
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "crispro941" -keypass "crispro941" \
            -dname "CN=Cristobal Paez, OU=Dev, O=CRISPRO941, L=Las Cabras, S=OHiggins, C=CL"

          # 3. INICIALIZAR PROYECTO
          # 'yes ""' responde ENTER a Domain y URL Path automáticamente
          echo "Generando configuración para: ${{ github.event.client_payload.url }}"
          yes "" | bubblewrap init --url=${{ github.event.client_payload.url }} --manifest=${{ github.event.client_payload.url }}/manifest.json --skipConfig || true
          
          # 4. INYECTAR CONTRASEÑAS PARA BUILD SILENCIOSO
          # Este archivo bubblewrap.json le dice al comando 'build' qué firma usar sin preguntar
          echo "{\"passwords\":{\"keystore\":\"crispro941\",\"key\":\"crispro941\"},\"keyPath\":\"./android.keystore\",\"alias\":\"android\"}" > bubblewrap.json

          # 5. COMPILACIÓN (Sin 'yes |' para evitar el Broken Pipe)
          # El flag --skipCheck es vital para que no intente validar el SDK de nuevo
          bubblewrap build --yes --skipCheck
          
          # 6. MOVER RESULTADO
          mkdir -p output
          find . -name "*.apk" -exec mv {} output/ \;
          
          if [ -z "$(ls -A output)" ]; then
            echo "Error: No se generó el APK."
            exit 1
          fi

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
