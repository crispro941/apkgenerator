name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          echo "Iniciando generación para: ${{ github.event.client_payload.url }}"
          
          # 1. Configuración de rutas (Indispensable para evitar el error 130)
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # 2. Inicialización automática
          # Al tener el manifest en la raíz, Bubblewrap lo detecta solo con la URL
          bubblewrap init --url=${{ github.event.client_payload.url }} --yes
          
          # 3. Compilación del APK real
          bubblewrap build --yes
          
          # 4. Preparar descarga
          mkdir -p output
          mv *.apk output/ || echo "No se encontró el APK"

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
          if-no-files-found: error
