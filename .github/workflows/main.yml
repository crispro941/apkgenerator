name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          echo "Iniciando generación para: ${{ github.event.client_payload.url }}"
          
          # 1. Pre-configuramos Bubblewrap de forma no interactiva
          # Enviamos: 'n' (no instalar JDK), luego la ruta del JDK, luego la ruta del SDK
          printf "n\n$JAVA_HOME\n$ANDROID_HOME\n" | bubblewrap doctor

          # 2. Inicializamos el proyecto
          # Usamos 'yes' para responder 'y' a todas las preguntas de confirmación
          yes | bubblewrap init --url=${{ github.event.client_payload.url }} --yes

          # 3. Construimos el APK
          bubblewrap build --yes

          # 4. Organizamos la salida
          mkdir -p output
          mv *.apk output/ || echo "No se encontró el APK en la raíz"

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
          if-no-files-found: error
