name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          # 1. RUTA ABSOLUTA
          CUR_DIR=$(pwd)
          KEYSTORE_PATH="$CUR_DIR/android.keystore"
          
          # 2. CAPTURAR PAYLOAD DINÁMICO
          APP_URL="${{ github.event.client_payload.url }}"
          APP_HOST=$(echo $APP_URL | sed -e 's,https://,,;s,/.*,,')
          APP_NAME="${{ github.event.client_payload.appName }}"
          PACKAGE_ID="${{ github.event.client_payload.packageId }}"
          THEME_COLOR="${{ github.event.client_payload.themeColor }}"
          BG_COLOR="${{ github.event.client_payload.backgroundColor }}"
          ICON_URL="${{ github.event.client_payload.iconUrl }}"
          # NUEVOS CAMPOS
          DISPLAY_MODE="${{ github.event.client_payload.display || 'standalone' }}"
          ORIENTATION="${{ github.event.client_payload.orientation || 'portrait' }}"
          V_NAME="${{ github.event.client_payload.vName || '1.0.0' }}"
          V_CODE="${{ github.event.client_payload.vCode || '1' }}"

          # 3. CONFIGURACIÓN DEL SISTEMA
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

          # 4. KEYSTORE
          keytool -genkey -v -keystore "$KEYSTORE_PATH" -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "crispro941" -keypass "crispro941" \
            -dname "CN=Cristobal Paez, OU=Dev, O=CRISPRO941, L=Las Cabras, S=OHiggins, C=CL"

          # 5. TWA-MANIFEST ULTRA PERSONALIZADO
          cat <<EOF > twa-manifest.json
          {
            "packageId": "$PACKAGE_ID",
            "host": "$APP_HOST",
            "name": "$APP_NAME",
            "shortName": "$APP_NAME",
            "themeColor": "$THEME_COLOR",
            "navigationColor": "$THEME_COLOR",
            "backgroundColor": "$BG_COLOR",
            "startUrl": "/",
            "iconUrl": "$ICON_URL",
            "maskableIconUrl": "$ICON_URL",
            "splashScreenFadeOutDuration": 300,
            "appVersionCode": $V_CODE,
            "appVersionName": "$V_NAME",
            "signingKey": {
              "path": "$KEYSTORE_PATH",
              "alias": "android"
            },
            "orientation": "$ORIENTATION",
            "display": "$DISPLAY_MODE",
            "webManifestUrl": "$APP_URL/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "enableNotifications": false,
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isMultiColorSchemeEnabled": false,
            "isWebWidgetsEnabled": false,
            "shortcuts": [],
            "unsupportedFeatures": []
          }
          EOF

          # 6. GENERAR Y PARCHEAR
          printf "$V_CODE\n$V_NAME\n" | bubblewrap update --skipConfig
          sed -i "s/enableNotifications: ,/enableNotifications: false,/g" app/build.gradle
          sed -i "s/splashScreenFadeOutDuration: ,/splashScreenFadeOutDuration: 300,/g" app/build.gradle
          sed -i 's/: ,/: "" ,/g' app/build.gradle

          # 7. GRADLE
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password=crispro941 \
            -Pandroid.injected.signing.key.alias=android \
            -Pandroid.injected.signing.key.password=crispro941

          # 8. OUTPUT
          mkdir -p output
          find . -name "*release.apk" -exec mv {} output/app-release.apk \;

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
