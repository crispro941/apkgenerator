name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Corregido: antes decía node-version
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          # 1. Configuración de rutas para Bubblewrap
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # 2. Inicialización del proyecto (init)
          # 'yes ""' responde ENTER a todas las preguntas de configuración inicial
          echo "Generando configuración para: ${{ github.event.client_payload.url }}"
          yes "" | bubblewrap init --url=${{ github.event.client_payload.url }} --manifest=${{ github.event.client_payload.url }}/manifest.json --skipConfig || true
          
          # 3. CREACIÓN AUTOMÁTICA DEL KEYSTORE
          # Generamos la firma digital de CRISPRO941 de forma no interactiva
          keytool -genkey -v -keystore android.keystore -alias androidlegacy -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "crispro941" -keypass "crispro941" \
            -dname "CN=Cristobal Paez, OU=Dev, O=CRISPRO941, L=Las Cabras, S=OHiggins, C=CL"

          # 4. Vincular la firma con Bubblewrap
          # Creamos el archivo de configuración de firma para evitar el bucle de preguntas
          echo "{\"passwords\":{\"keystore\":\"crispro941\",\"key\":\"crispro941\"},\"keyPath\":\"./android.keystore\",\"alias\":\"androidlegacy\"}" > bubblewrap.json

          # 5. Compilación del APK
          # 'yes' acepta las licencias de Android y '--yes' confirma la compilación
          yes | bubblewrap build --yes
          
          # 6. Mover el resultado a la carpeta de salida
          mkdir -p output
          mv *.apk output/ 2>/dev/null || true
          mv app/build/outputs/apk/release/*.apk output/ 2>/dev/null || true
          
          # Verificación final
          if [ -z "$(ls -A output)" ]; then
            echo "Error: No se encontró el archivo APK generado."
            exit 1
          fi

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
          if-no-files-found: error
