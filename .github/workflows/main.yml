name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          # 1. INSTALAR DEPENDENCIAS EXTRA (Para asegurar compatibilidad)
          sudo apt-get update && sudo apt-get install -y expect

          # 2. CONFIGURACIÓN DEL ENTORNO
          # Creamos el config.json con las rutas exactas del runner
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\",\"lastCheckForUpdates\":$(date +%s%3N)}" > ~/.bubblewrap/config.json
          
          # 3. ACEPTAR LICENCIAS DE ANDROID (Vital para que 'build' no falle)
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

          # 4. CREACIÓN DEL KEYSTORE
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "crispro941" -keypass "crispro941" \
            -dname "CN=Cristobal Paez, OU=Dev, O=CRISPRO941, L=Las Cabras, S=OHiggins, C=CL"

          # 5. INICIALIZAR PROYECTO
          # Usamos un archivo de respuestas para evitar el Broken Pipe y asegurar que tome los valores correctos
          echo "Generando proyecto para: ${{ github.event.client_payload.url }}"
          
          # Respuestas: URL, Path, Name, ShortName, AppID, Version, Display, Orientation, StatusColor, SplashColor, Icon, MaskableIcon, Monochrome, Shortcuts, PlayBilling, Geolocation, KeystorePath, KeyAlias
          printf "${{ github.event.client_payload.url }}\n/\nCRISPRO941\nCRISPRO941\ncl.crispro941.twa\n1\nstandalone\nportrait\n#000000\n#FFFFFF\nhttps://i.ibb.co/M5BsCD9K/descarga.png\nhttps://i.ibb.co/M5BsCD9K/descarga.png\n\nn\nn\nn\n./android.keystore\nandroid\n" | bubblewrap init --url=${{ github.event.client_payload.url }} --manifest=${{ github.event.client_payload.url }}/manifest.json --skipConfig

          # 6. INYECTAR CONTRASEÑAS PARA FIRMA
          echo "{\"passwords\":{\"keystore\":\"crispro941\",\"key\":\"crispro941\"},\"keyPath\":\"./android.keystore\",\"alias\":\"android\"}" > bubblewrap.json

          # 7. COMPILACIÓN CON FORZADO DE SDK
          # Usamos --yes para aceptar cualquier diálogo restante
          bubblewrap build --yes --skipCheck

          # 8. MOVER RESULTADO
          mkdir -p output
          find . -name "*.apk" -exec mv {} output/ \;
          
          if [ -z "$(ls -A output)" ]; then
            echo "Error: El archivo APK no se encontró."
            exit 1
          fi

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
