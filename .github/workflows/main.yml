name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          echo "Iniciando generación para: ${{ github.event.client_payload.url }}"
          
          # 1. Instalar expect para automatizar el diálogo
          sudo apt-get update && sudo apt-get install -y expect

          # 2. Forzar configuración de rutas
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # 3. Automatizar el init con expect
          # Este script espera cada pregunta y presiona ENTER automáticamente
          expect -c "
          set timeout -1
          spawn bubblewrap init --url=${{ github.event.client_payload.url }} --manifest=${{ github.event.client_payload.url }}manifest.json --yes
          expect \"Domain:\" { send \"\r\" }
          expect \"URL path:\" { send \"\r\" }
          expect \"Application ID:\" { send \"\r\" }
          expect \"Application name:\" { send \"\r\" }
          expect \"Short name:\" { send \"\r\" }
          expect \"Address bar color:\" { send \"\r\" }
          expect \"Icon URL:\" { send \"\r\" }
          expect \"Maskable icon URL:\" { send \"\r\" }
          expect \"Splash screen color:\" { send \"\r\" }
          expect eof
          "

          # 4. Compilación del APK real
          # Este paso bajará el SDK de Android y tardará unos minutos
          bubblewrap build --yes
          
          # 5. Mover el resultado
          mkdir -p output
          mv *.apk output/ || echo "No se encontró el APK"
          
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
          if-no-files-found: error
