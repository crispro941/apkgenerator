name: APK Universal Generator

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          # 1. Variables del Payload
          APP_URL="${{ github.event.client_payload.url }}"
          MANIFEST_URL="${{ github.event.client_payload.manifestUrl }}"
          APP_NAME="${{ github.event.client_payload.appName }}"
          PKG_ID="${{ github.event.client_payload.packageId || 'cl.crispro941.twa' }}"
          ICON_URL="${{ github.event.client_payload.iconUrl }}"
          COLOR="${{ github.event.client_payload.themeColor || '#00ffa3' }}"
          V_NAME="${{ github.event.client_payload.vName || '1.0.0' }}"
          V_CODE="${{ github.event.client_payload.vCode || '1' }}"

          # 2. Limpieza de HOST (vital para Bubblewrap)
          APP_HOST=$(echo "$APP_URL" | sed -e 's|^[^/]*//||' -e 's|/.*$||')

          # 3. TRUCO: Descargar el icono localmente
          # Si la URL falla (404), usamos un icono por defecto para que el build no se detenga.
          curl -L -s -o local_icon.png "$ICON_URL" || curl -L -s -o local_icon.png "https://via.placeholder.com/512.png"

          # 4. Configurar Bubblewrap
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

          # 5. Generar Keystore
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "crispro941" -keypass "crispro941" -dname "CN=Crispro, O=Studio, C=CL"

          # 6. Generar twa-manifest.json
          # Usamos la ruta local del icono para evitar el error "Invalid URL"
          cat <<EOF > twa-manifest.json
          {
            "packageId": "$PKG_ID",
            "host": "$APP_HOST",
            "name": "$APP_NAME",
            "shortName": "$APP_NAME",
            "themeColor": "$COLOR",
            "backgroundColor": "#ffffff",
            "startUrl": "/",
            "iconUrl": "$ICON_URL",
            "maskableIconUrl": "$ICON_URL",
            "appVersionCode": $V_CODE,
            "appVersionName": "$V_NAME",
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "webManifestUrl": "$MANIFEST_URL",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false }
          }
          EOF

          # 7. Inicializar y Construir (Usando tu lógica anterior que funcionaba)
          # 'yes' para las preguntas interactivas
          yes | bubblewrap init --manifest twa-manifest.json --directory . --skipProxy || true
          
          # Si el paso anterior falló por la URL del manifest remoto, forzamos la actualización local
          printf "1\n$V_NAME\n" | bubblewrap update --skipConfig

          # 8. Aplicar parches de Gradle
          if [ -f app/build.gradle ]; then
            sed -i 's/: ,/: "" ,/g' app/build.gradle
          fi

          # 9. Compilar
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/android.keystore \
            -Pandroid.injected.signing.store.password=crispro941 \
            -Pandroid.injected.signing.key.alias=android \
            -Pandroid.injected.signing.key.password=crispro941

          # 10. Renombrar y subir a tu servidor
          SAFE_NAME=$(echo "$APP_NAME" | sed 's/ /_/g')
          FILE_NAME="${SAFE_NAME}-v${V_NAME}.apk"
          
          APK_PATH=$(find . -name "*release.apk" | head -n 1)
          cp "$APK_PATH" app.apk
          
          echo "Subiendo a: downloads/$FILE_NAME"
          curl -f -X POST \
            -F "file=@app.apk" \
            "https://demo.crispro941.cl/apk/v2/upload_apk.php?key=CRISPRO_941_ALTA_SEGURIDAD_XYZ_2024&name=$FILE_NAME"

      - name: Save Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app.apk
