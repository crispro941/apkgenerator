name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          # 1. CONFIGURACIÓN OFICIAL DE BUBBLEWRAP
          # 'n' responde "No" a la pregunta de si queremos que Bubblewrap descargue su propio JDK/SDK
          echo "Configurando rutas de herramientas..."
          printf "n\n" | bubblewrap config set jdkPath "${JAVA_HOME}"
          printf "n\n" | bubblewrap config set androidSdkPath "${ANDROID_HOME}"

          # 2. ACEPTAR LICENCIAS DE ANDROID
          # Esto es obligatorio para que el proceso de compilación no se detenga
          echo "Aceptando licencias de Android..."
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null

          # 3. CREACIÓN DEL KEYSTORE (FIRMA)
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "crispro941" -keypass "crispro941" \
            -dname "CN=Cristobal Paez, OU=Dev, O=CRISPRO941, L=Las Cabras, S=OHiggins, C=CL"

          # 4. CREAR EL ARCHIVO TWA-MANIFEST
          cat <<EOF > twa-manifest.json
          {
            "packageId": "cl.crispro941.twa",
            "host": "crispro941.cl",
            "name": "CRISPRO941",
            "shortName": "CRISPRO941",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#ffffff",
            "startUrl": "/",
            "iconUrl": "https://i.ibb.co/M5BsCD9K/descarga.png",
            "maskableIconUrl": "https://i.ibb.co/M5BsCD9K/descarga.png",
            "appVersionCode": 1,
            "appVersionName": "1.0.0",
            "orientation": "portrait",
            "display": "standalone",
            "signingKey": {
              "path": "./android.keystore",
              "alias": "android"
            },
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://crispro941.cl/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isMultiColorSchemeEnabled": false,
            "isWebWidgetsEnabled": false,
            "shortcuts": [],
            "unsupportedFeatures": []
          }
          EOF

          # 5. GENERAR PROYECTO (UPDATE)
          # Respondemos "1" y "1.0" para las preguntas de versión
          echo "Actualizando proyecto Android..."
          printf "1\n1.0\n" | bubblewrap update --skipConfig

          # 6. CONFIGURAR CONTRASEÑAS PARA EL BUILD
          echo "{\"passwords\":{\"keystore\":\"crispro941\",\"key\":\"crispro941\"},\"keyPath\":\"./android.keystore\",\"alias\":\"android\"}" > bubblewrap.json

          # 7. COMPILACIÓN FINAL
          echo "Iniciando compilación final..."
          bubblewrap build --yes

          # 8. MOVER RESULTADO
          mkdir -p output
          find . -name "*.apk" -exec mv {} output/ \;
          
          if [ -z "$(ls -A output)" ]; then
            echo "Error: No se generó el APK."
            exit 1
          fi

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
