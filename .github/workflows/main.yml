name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          # 1. OBTENER RUTA ABSOLUTA Y VALORES DEL PAYLOAD
          CUR_DIR=$(pwd)
          KEYSTORE_PATH="$CUR_DIR/android.keystore"
          
          # Extraemos los valores del payload con fallbacks por si no se envían
          APP_URL="${{ github.event.client_payload.url || 'https://crispro941.cl' }}"
          APP_HOST=$(echo $APP_URL | sed -e 's,https://,,;s,/.*,,')
          APP_NAME="${{ github.event.client_payload.appName || 'Mi App' }}"
          PACKAGE_ID="${{ github.event.client_payload.packageId || 'com.example.app' }}"
          THEME_COLOR="${{ github.event.client_payload.themeColor || '#000000' }}"
          BG_COLOR="${{ github.event.client_payload.backgroundColor || '#FFFFFF' }}"
          ICON_URL="${{ github.event.client_payload.iconUrl || 'https://i.ibb.co/M5BsCD9K/descarga.png' }}"

          # 2. PRE-CONFIGURACIÓN
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

          # 3. CREACIÓN DEL KEYSTORE
          keytool -genkey -v -keystore "$KEYSTORE_PATH" -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "crispro941" -keypass "crispro941" \
            -dname "CN=Cristobal Paez, OU=Dev, O=CRISPRO941, L=Las Cabras, S=OHiggins, C=CL"

          # 4. CREAR TWA-MANIFEST DINÁMICO
          cat <<EOF > twa-manifest.json
          {
            "packageId": "$PACKAGE_ID",
            "host": "$APP_HOST",
            "name": "$APP_NAME",
            "shortName": "$APP_NAME",
            "themeColor": "$THEME_COLOR",
            "navigationColor": "$THEME_COLOR",
            "backgroundColor": "$BG_COLOR",
            "startUrl": "/",
            "iconUrl": "$ICON_URL",
            "maskableIconUrl": "$ICON_URL",
            "splashScreenFadeOutDuration": 300,
            "appVersionCode": 1,
            "appVersionName": "1.0.0",
            "signingKey": {
              "path": "$KEYSTORE_PATH",
              "alias": "android"
            },
            "orientation": "portrait",
            "display": "standalone",
            "webManifestUrl": "$APP_URL/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "enableNotifications": false,
            "alphaDependencies": { "enabled": false }
          }
          EOF

          # 5. GENERAR PROYECTO ANDROID
          printf "1\n1.0.0\n" | bubblewrap update --skipConfig

          # 6. PARCHES DE SINTAXIS
          sed -i 's/enableNotifications: ,/enableNotifications: false,/g' app/build.gradle
          sed -i 's/splashScreenFadeOutDuration: ,/splashScreenFadeOutDuration: 300,/g' app/build.gradle
          sed -i 's/: ,/: "" ,/g' app/build.gradle

          # 7. COMPILACIÓN DIRECTA CON GRADLE
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password=crispro941 \
            -Pandroid.injected.signing.key.alias=android \
            -Pandroid.injected.signing.key.password=crispro941

          # 8. ORGANIZAR RESULTADO
          mkdir -p output
          find . -name "*release.apk" -exec mv {} output/app-release.apk \;
          
          if [ ! -f output/app-release.apk ]; then
            echo "Error: No se pudo generar el APK."
            exit 1
          fi
          echo "--- COMPILACIÓN EXITOSA ---"

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
