name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          # 1. PRE-CONFIGURACIÓN DE RUTAS
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\",\"lastCheckForUpdates\":$(date +%s%3N)}" > ~/.bubblewrap/config.json

          # 2. CREACIÓN DEL KEYSTORE
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "crispro941" -keypass "crispro941" \
            -dname "CN=Cristobal Paez, OU=Dev, O=CRISPRO941, L=Las Cabras, S=OHiggins, C=CL"

          # 3. CREAR EL ARCHIVO TWA-MANIFEST COMPLETO
          cat <<EOF > twa-manifest.json
          {
            "packageId": "cl.crispro941.twa",
            "host": "crispro941.cl",
            "name": "CRISPRO941",
            "shortName": "CRISPRO941",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#ffffff",
            "startUrl": "/",
            "iconUrl": "https://i.ibb.co/M5BsCD9K/descarga.png",
            "maskableIconUrl": "https://i.ibb.co/M5BsCD9K/descarga.png",
            "appVersionCode": 1,
            "appVersionName": "1.0.0",
            "orientation": "portrait",
            "display": "standalone",
            "signingKey": {
              "path": "../android.keystore",
              "alias": "android"
            },
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://crispro941.cl/manifest.json",
            "fallbackType": "customtabs",
            "features": {
                "locationDelegation": { "enabled": false },
                "playBilling": { "enabled": false }
            },
            "enableNotifications": false,
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isMultiColorSchemeEnabled": false,
            "isWebWidgetsEnabled": false,
            "shortcuts": [],
            "unsupportedFeatures": []
          }
          EOF

          # 4. GENERAR PROYECTO ANDROID (UPDATE)
          echo "Generando estructura del proyecto..."
          printf "1\n1.0.0\n" | bubblewrap update --skipConfig

          # 5. PARCHE DE EMERGENCIA (Corrige el error de sintaxis en build.gradle)
          # Buscamos la línea "enableNotifications: ," y la cambiamos por "enableNotifications: false,"
          echo "Aplicando parche de sintaxis al build.gradle..."
          sed -i 's/enableNotifications: ,/enableNotifications: false,/g' app/build.gradle

          # 6. COMPILACIÓN DIRECTA CON GRADLE
          echo "Iniciando compilación con Gradle..."
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=../android.keystore \
            -Pandroid.injected.signing.store.password=crispro941 \
            -Pandroid.injected.signing.key.alias=android \
            -Pandroid.injected.signing.key.password=crispro941

          # 7. ORGANIZAR RESULTADO
          mkdir -p output
          find . -name "*release.apk" -exec mv {} output/app-release.apk \;
          
          if [ ! -f output/app-release.apk ]; then
            echo "Error: El APK no se pudo construir."
            exit 1
          fi
          echo "--- COMPILACIÓN EXITOSA ---"

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
