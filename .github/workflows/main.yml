name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          # 1. IDENTIFICAR RUTAS REALES
          # En GitHub Actions, ANDROID_HOME suele estar en /usr/local/lib/android/sdk
          export ANDROID_SDK_PATH=$ANDROID_HOME
          export JDK_PATH=$JAVA_HOME
          
          echo "Usando SDK: $ANDROID_SDK_PATH"
          echo "Usando JDK: $JDK_PATH"

          # 2. CONFIGURACIÓN FORMAL DE BUBBLEWRAP
          # En lugar de escribir el JSON a mano, usamos el comando oficial
          bubblewrap config set jdkPath "$JDK_PATH"
          bubblewrap config set androidSdkPath "$ANDROID_SDK_PATH"

          # 3. CREACIÓN DEL KEYSTORE
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "crispro941" -keypass "crispro941" \
            -dname "CN=Cristobal Paez, OU=Dev, O=CRISPRO941, L=Las Cabras, S=OHiggins, C=CL"

          # 4. INICIALIZAR PROYECTO
          # Usamos un archivo temporal para responder a las preguntas de Bubblewrap de forma segura
          echo "Generando configuración para: ${{ github.event.client_payload.url }}"
          
          # El comando 'init' de Bubblewrap es interactivo. 
          # Esta secuencia de 'echo' responde a las preguntas básicas (Domain, Path, Names, etc.)
          (echo "${{ github.event.client_payload.url }}"; echo "/"; echo "CRISPRO941 App"; echo "CRISPRO941"; echo "cl.crispro941.twa"; echo "1"; echo "standalone"; echo "portrait"; echo "#000000"; echo "#FFFFFF"; echo "https://i.ibb.co/M5BsCD9K/descarga.png"; echo "https://i.ibb.co/M5BsCD9K/descarga.png"; echo ""; echo "n"; echo "n"; echo "./android.keystore"; echo "android") | bubblewrap init --url=${{ github.event.client_payload.url }} --manifest=${{ github.event.client_payload.url }}/manifest.json --skipConfig

          # 5. INYECTAR CONTRASEÑAS PARA BUILD
          echo "{\"passwords\":{\"keystore\":\"crispro941\",\"key\":\"crispro941\"},\"keyPath\":\"./android.keystore\",\"alias\":\"android\"}" > bubblewrap.json

          # 6. COMPILACIÓN
          # --skipCheck es para que no intente descargar el SDK de nuevo
          bubblewrap build --yes --skipCheck

          # 7. MOVER RESULTADO
          mkdir -p output
          find . -name "*.apk" -exec mv {} output/ \;

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
