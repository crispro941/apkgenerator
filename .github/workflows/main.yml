name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Node 20 es más estable para herramientas actuales

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

     - name: Build APK from URL
        run: |
          # 1. Configuración de rutas
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # 2. Generar el proyecto usando "yes" para responder ENTER a todo
          # Esto evita el error 130 de espera interactiva
          echo "Iniciando generación para: ${{ github.event.client_payload.url }}"
          
          yes "" | bubblewrap init --url=${{ github.event.client_payload.url }} --manifest=${{ github.event.client_payload.url }}/manifest.json --skipConfig || true
          
          # 3. Compilación silenciosa aceptando licencias
          # Usamos 'yes' de nuevo por si Gradle pide aceptar licencias de Android SDK
          yes | bubblewrap build --yes
          
          # 4. Mover el archivo final
          mkdir -p output
          mv *.apk output/ 2>/dev/null || echo "No se encontró APK, revisando carpetas..."
          mv app/build/outputs/apk/release/*.apk output/ 2>/dev/null || true

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
