name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          # 1. Configurar rutas forzando "No" a la instalación automática
          # Usamos 'echo n' para decirle que NO instale su propio JDK
          echo "n" | bubblewrap doctor --jdkPath="$JAVA_HOME" --androidSdkPath="$ANDROID_HOME"
          
          # 2. Crear Keystore antes del init
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "crispro941" -keypass "crispro941" \
            -dname "CN=Cristobal Paez, OU=Dev, O=CRISPRO941, L=Las Cabras, S=OHiggins, C=CL"

          # 3. Inicializar el proyecto
          echo "Generando configuración para: ${{ github.event.client_payload.url }}"
          yes "" | bubblewrap init --url=${{ github.event.client_payload.url }} --manifest=${{ github.event.client_payload.url }}/manifest.json --skipConfig || true
          
          # 4. Crear archivo de firma para build silencioso
          echo "{\"passwords\":{\"keystore\":\"crispro941\",\"key\":\"crispro941\"},\"keyPath\":\"./android.keystore\",\"alias\":\"android\"}" > bubblewrap.json

          # 5. Compilación final
          bubblewrap build --yes --skipCheck
          
          # 6. Mover APK a salida
          mkdir -p output
          find . -name "*.apk" -exec mv {} output/ \;
          
          if [ -z "$(ls -A output)" ]; then
            echo "Error: No se encontró el APK."
            exit 1
          fi

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
