name: Build APK

on:
  repository_dispatch:
    types: [build-app] # Debe coincidir con el event_type de tu PHP

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Bubblewrap (CLI para Web-to-APK)
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          # Aquí usamos la URL que enviaste desde PHP
          # Nota: Este es un ejemplo conceptual de cómo usar el payload
          echo "Generando APK para: ${{ github.event.client_payload.url }}"
          
          # COMANDO DE EJEMPLO (Dependerá de tu herramienta de build)
          # Si usas un script propio, aquí es donde lo ejecutas:
          # ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppGenerada
          path: app/build/outputs/apk/debug/app-debug.apk # La ruta donde quede tu APK
