name: APK Generator Pipeline

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK from URL
        run: |
          # 1. PRE-CONFIGURACIÓN (Rutas de GitHub Actions)
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # 2. CREACIÓN DEL KEYSTORE
          # Importante: lo creamos en la raíz del proyecto
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "crispro941" -keypass "crispro941" \
            -dname "CN=Cristobal Paez, OU=Dev, O=CRISPRO941, L=Las Cabras, S=OHiggins, C=CL"

          # 3. INICIALIZAR PROYECTO
          # 'yes ""' envía "Enter" infinitamente. 
          # Como ya configuramos el SDK y el Keystore existe, Bubblewrap tomará todo por defecto.
          echo "Iniciando generación para: ${{ github.event.client_payload.url }}"
          yes "" | bubblewrap init --url=${{ github.event.client_payload.url }} --manifest=${{ github.event.client_payload.url }}/manifest.json --skipConfig || true

          # 4. INYECTAR FIRMA PARA EL BUILD
          # Esto evita que el comando 'build' pregunte por la contraseña
          echo "{\"passwords\":{\"keystore\":\"crispro941\",\"key\":\"crispro941\"},\"keyPath\":\"./android.keystore\",\"alias\":\"android\"}" > bubblewrap.json

          # 5. COMPILACIÓN FINAL
          # --yes acepta las licencias de Android automáticamente
          bubblewrap build --yes --skipCheck

          # 6. ORGANIZAR RESULTADOS
          mkdir -p output
          find . -name "*.apk" -exec mv {} output/ \;
          
          if [ -z "$(ls -A output)" ]; then
            echo "Error: No se encontró el archivo APK generado."
            exit 1
          fi

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: App_Generada_Crispro
          path: "output/*.apk"
          retention-days: 1
